name: 🤖 Auto Score Submission

on:
  issues:
    types: [opened]

jobs:
  process-score:
    if: contains(github.event.issue.labels.*.name, 'score-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse Issue Body
        id: parse
        run: |
          BODY="${{ github.event.issue.body }}"
          # Expecting body to contain exactly one row: | 🏅 | @user | 00:00 | 2024-03-09 |
          ROW=$(echo "$BODY" | grep -E '^\|.*\|.*\|.*\|.*\|$' | head -n 1)
          TITLE="${{ github.event.issue.title }}"
          # Extract game ID from title: "[Score Submission] game-id"
          GAME=$(echo "$TITLE" | sed 's/\[Score Submission\] //g' | xargs)
          
          if [ -z "$ROW" ]; then
            echo "::error::Could not find a valid score row in issue body."
            exit 1
          fi
          
          echo "row=$ROW" >> $GITHUB_OUTPUT
          echo "game=$GAME" >> $GITHUB_OUTPUT
          echo "user=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          node .github/scripts/validate-readme.js README.md --game "${{ steps.parse.outputs.game }}" --insert "${{ steps.parse.outputs.row }}"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: add score for @${{ steps.parse.outputs.user }} to ${{ steps.parse.outputs.game }}"
          branch: "score-entry/${{ steps.parse.outputs.user }}-${{ github.run_id }}"
          title: "🏆 Score: ${{ steps.parse.outputs.game }} — @${{ steps.parse.outputs.user }}"
          body: |
            Automated score submission from Issue #${{ github.event.issue.number }}.
            
            **Game:** ${{ steps.parse.outputs.game }}
            **Player:** @${{ steps.parse.outputs.user }}
            
            This PR was automatically generated and will be merged after validation.
          labels: score-submission

      - name: Auto-Merge PR
        if: steps.cpr.outputs.pull-request-number
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --merge --auto --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Issue
        if: success()
        run: |
          gh issue close "${{ github.event.issue.number }}" --comment "Success! Your score has been added to the leaderboard via PR #${{ steps.cpr.outputs.pull-request-number }}. 🎉"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle Failure
        if: failure()
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "❌ Automated submission failed. Please ensure your issue body contains exactly one valid score row in the correct format."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
